name: app-release
# 两种触发方式：
#   1) 推送 v* Tag 自动触发（TAG 已存在）
#   2) workflow_dispatch 手动触发：从 simple_live_app/pubspec.yaml 读版本号自动拼出 tag，
#      不存在则通过 GitHub API 在 target_ref 指向的 commit 上创建 tag
on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or commit SHA to tag from (only used when the tag does not yet exist). Default: master"
        required: false
        type: string
        default: "master"
      suffix:
        description: "Optional pre-release suffix appended to the version, e.g. '-beta1', '-alpha', '-rc1'. Leave empty for a stable release."
        required: false
        type: string
        default: ""
  push:
    tags:
      - "v*"
jobs:
  # 解析/创建 tag：
  #   - push.tags 触发时，直接使用 github.ref_name（tag 已存在）
  #   - workflow_dispatch 触发时，checkout target_ref → 从 pubspec 取版本 → 拼 tag 名 →
  #     检查原端是否已有 → 没有则调 GitHub API 创建（GITHUB_TOKEN 推 tag 不会二次触发 push 事件）
  resolve-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout target ref (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}
          fetch-depth: 1

      - name: Resolve tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_SUFFIX: ${{ github.event.inputs.suffix }}
          INPUT_TARGET_REF: ${{ github.event.inputs.target_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            TAG="$REF_NAME"
            echo "Triggered by tag push, using tag: $TAG"
          else
            # 从 pubspec 提取语义版本号（取 "+" 之前的部分，如 1.11.4+11104 -> 1.11.4）
            VERSION=$(grep -E '^version:' simple_live_app/pubspec.yaml | sed -E 's/^version:[[:space:]]*([^+[:space:]]+).*/\1/')
            if [ -z "$VERSION" ]; then
              echo "::error::Failed to parse version from simple_live_app/pubspec.yaml"
              exit 1
            fi
            TAG="v${VERSION}${INPUT_SUFFIX}"
            echo "Resolved from pubspec: version=$VERSION, suffix='$INPUT_SUFFIX', tag=$TAG"

            if git ls-remote --exit-code --tags "https://github.com/$REPO" "refs/tags/$TAG" > /dev/null 2>&1; then
              echo "Tag '$TAG' already exists on origin; reusing."
            else
              SHA=$(git rev-parse HEAD)
              echo "Creating tag '$TAG' at SHA $SHA (target_ref='$INPUT_TARGET_REF') via GitHub API..."
              HTTP_CODE=$(curl -sS -o /tmp/tag_resp.json -w "%{http_code}" -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPO/git/refs" \
                -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"$SHA\"}")
              if [ "$HTTP_CODE" != "201" ]; then
                echo "::error::Failed to create tag (HTTP $HTTP_CODE):"
                cat /tmp/tag_resp.json
                exit 1
              fi
              echo "Tag '$TAG' created on origin."
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-mac-ios-android:
    needs: [resolve-tag]
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.resolve-tag.outputs.tag }}
      # 将签名相关 secret 映射到 env，方便后续 `if: env.KEYSTORE_BASE64 != ''` 判空。
      # secret 缺失时这些 env 为空字符串，签名 step 整段跳过，Android 由 gradle 回退至 debug 签名。
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
    steps:
      # 签出代码至 resolve-tag 产出的 tag
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      # APK 签名：KEYSTORE_BASE64 secret 存在时才执行；缺失则跳过（产出 debug 签名的 APK）
      - name: Download Android keystore
        if: env.KEYSTORE_BASE64 != ''
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Create key.properties
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > simple_live_app/android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_app/android/key.properties

      #设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      #设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 打开MAC Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      #更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 安装appdmg npm install -g appdmg
      - name: Install appdmg
        run: npm install -g appdmg

      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor

      #打包APK
      - name: Build APK
        run: |
          cd simple_live_app
          flutter build apk --release --split-per-abi

      #上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      #打包iOS
      - name: Build IPA
        run: |
          cd simple_live_app
          flutter build ios --release --no-codesign

      #创建未签名ipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_no_sign.ipa Payload
          cd ../../..

      #上传IPA至Artifacts
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: |
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa

      # 打包MAC
      - name: Build MacOS
        run: |
          cd simple_live_app
          flutter_distributor package --platform macos --targets dmg,zip --skip-clean

      # 上传MAC至Artifacts
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip

      # 打印目标 tag 便于排错
      - name: Echo target tag
        run: echo "TAG_NAME=${{ env.TAG_NAME }}"

      #上传至Release（TOKEN 缺失时回退到默认的 GITHUB_TOKEN）
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          prerelease: ${{ contains(env.TAG_NAME, 'beta') || contains(env.TAG_NAME, 'alpha') }}
          token: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            simple_live_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_app/build/ios/iphoneos/ios_no_sign.ipa
            simple_live_app/build/dist/*/*.dmg
            simple_live_app/build/dist/*/*.zip
      #完成
      - run: echo "🍏 This job's status is ${{ job.status }}."

  # 打包Linux
  build-linux:
    needs: [resolve-tag]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      # 签出代码至 resolve-tag 产出的 tag
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}
      # 设置Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      # 安装依赖
      - name: Update apt-get
        run: sudo apt-get update
      - name: Install Dependencies
        run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv
      # 打开Linux Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-linux-desktop
      # 更新Flutter的packages
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Linux ZIP\DMG
      - name: Build Linux
        run: |
          cd simple_live_app
          flutter_distributor package --platform linux --targets deb,zip --skip-clean
      # 上传Linux包至Artifacts
      - name: Upload Linux APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip

      # 打印目标 tag 便于排错
      - name: Echo target tag
        run: echo "TAG_NAME=${{ env.TAG_NAME }}"

      #上传至Release（TOKEN 缺失时回退到默认的 GITHUB_TOKEN）
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          prerelease: ${{ contains(env.TAG_NAME, 'beta') || contains(env.TAG_NAME, 'alpha') }}
          token: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            simple_live_app/build/dist/*/*.deb
            simple_live_app/build/dist/*/*.zip
        #完成
      - run: echo "🍏 Linux job's status is ${{ job.status }}."

  # 打包Windows
  build-windows:
    needs: [resolve-tag]
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.resolve-tag.outputs.tag }}
    steps:
      # 签出代码至 resolve-tag 产出的 tag
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}
      # 设置Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get
      # 设置flutter_distributor环境
      - name: Install flutter_distributor
        run: dart pub global activate flutter_distributor
      # build Windows ZIP\MSIX
      - name: Build Windows
        run: |
          cd simple_live_app
          flutter_distributor package --platform windows --targets msix,zip --skip-clean

      # 上传Windows至Artifacts
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip

      # 打印目标 tag 便于排错
      - name: Echo target tag
        shell: bash
        run: echo "TAG_NAME=${{ env.TAG_NAME }}"

      #上传至Release（TOKEN 缺失时回退到默认的 GITHUB_TOKEN）
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          generate_release_notes: true
          prerelease: ${{ contains(env.TAG_NAME, 'beta') || contains(env.TAG_NAME, 'alpha') }}
          token: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            simple_live_app/build/dist/*/*.msix
            simple_live_app/build/dist/*/*.zip

      #完成
      - run: echo "🍏 Windows job's status is ${{ job.status }}."
