name: tv-app-release
# 两种触发方式：
#   1) 推送 tv_* Tag 自动触发（TAG 已存在）
#   2) workflow_dispatch 手动触发：从 simple_live_tv_app/pubspec.yaml 读版本号自动拼出 tag，
#      不存在则通过 GitHub API 在 target_ref 指向的 commit 上创建 tag
on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch or commit SHA to tag from (only used when the tag does not yet exist). Default: master"
        required: false
        type: string
        default: "master"
      suffix:
        description: "Optional pre-release suffix appended to the version, e.g. '-beta1', '-alpha', '-rc1'. Leave empty for a stable release."
        required: false
        type: string
        default: ""
  push:
    tags:
      - "tv_*"
jobs:
  # 解析/创建 tag：push 时直用 ref_name；dispatch 时从 pubspec 拼出 tv_v<version><suffix>
  resolve-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout target ref (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_ref }}
          fetch-depth: 1

      - name: Resolve tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_SUFFIX: ${{ github.event.inputs.suffix }}
          INPUT_TARGET_REF: ${{ github.event.inputs.target_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "push" ]; then
            TAG="$REF_NAME"
            echo "Triggered by tag push, using tag: $TAG"
          else
            # 从 pubspec 提取语义版本号（取 "+" 之前的部分，如 1.6.5+10605 -> 1.6.5）
            VERSION=$(grep -E '^version:' simple_live_tv_app/pubspec.yaml | sed -E 's/^version:[[:space:]]*([^+[:space:]]+).*/\1/')
            if [ -z "$VERSION" ]; then
              echo "::error::Failed to parse version from simple_live_tv_app/pubspec.yaml"
              exit 1
            fi
            TAG="tv_v${VERSION}${INPUT_SUFFIX}"
            echo "Resolved from pubspec: version=$VERSION, suffix='$INPUT_SUFFIX', tag=$TAG"

            if git ls-remote --exit-code --tags "https://github.com/$REPO" "refs/tags/$TAG" > /dev/null 2>&1; then
              echo "Tag '$TAG' already exists on origin; reusing."
            else
              SHA=$(git rev-parse HEAD)
              echo "Creating tag '$TAG' at SHA $SHA (target_ref='$INPUT_TARGET_REF') via GitHub API..."
              HTTP_CODE=$(curl -sS -o /tmp/tag_resp.json -w "%{http_code}" -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPO/git/refs" \
                -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"$SHA\"}")
              if [ "$HTTP_CODE" != "201" ]; then
                echo "::error::Failed to create tag (HTTP $HTTP_CODE):"
                cat /tmp/tag_resp.json
                exit 1
              fi
              echo "Tag '$TAG' created on origin."
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-tv:
    needs: [resolve-tag]
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ needs.resolve-tag.outputs.tag }}
      # TV 签名 secret 映射——缺失时签名 step 跳过，Android 由 gradle 回退 debug 签名
      TV_KEYSTORE_BASE64: ${{ secrets.TV_KEYSTORE_BASE64 }}
      TV_STORE_PASSWORD: ${{ secrets.TV_STORE_PASSWORD }}
      TV_KEY_PASSWORD: ${{ secrets.TV_KEY_PASSWORD }}
      TV_KEY_ALIAS: ${{ secrets.TV_KEY_ALIAS }}
    steps:
      # 签出代码至 resolve-tag 产出的 tag
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      # APK 签名：TV_KEYSTORE_BASE64 secret 存在时才执行；缺失则跳过（产出 debug 签名的 APK）
      - name: Download Android keystore
        if: env.TV_KEYSTORE_BASE64 != ''
        id: android_tv_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.TV_KEYSTORE_BASE64 }}
      - name: Create key.properties
        if: env.TV_KEYSTORE_BASE64 != ''
        run: |
          echo "storeFile=${{ steps.android_tv_keystore.outputs.filePath }}" > simple_live_tv_app/android/key.properties
          echo "storePassword=${{ secrets.TV_STORE_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyPassword=${{ secrets.TV_KEY_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyAlias=${{ secrets.TV_KEY_ALIAS }}" >> simple_live_tv_app/android/key.properties

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      #设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      #更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      #打包APK
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      #上传APK至Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      #读取版本信息
      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/tv_app_version.json
      - name: Echo version
        run: echo "${{ fromJson(steps.version.outputs.content).version }}"
      - name: Echo version content
        run: echo "${{ fromJson(steps.version.outputs.content).version_desc }}"

      #上传至Release（release 显示名/正文由 JSON 提供；tag_name 显式绑定 git tag；TOKEN 缺失时回退到 GITHUB_TOKEN）
      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "# Android TV \n${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          token: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      #完成
      - run: echo "🍏 This job's status is ${{ job.status }}."
