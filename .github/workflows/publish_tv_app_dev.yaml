name: tv-app-dev
# 推送 dev_tv_v* Tag 时自动触发；也可通过 workflow_dispatch 手动指定 tag/分支 重跑
on:
    workflow_dispatch:
        inputs:
            ref:
                description: "Git ref to checkout (tag name, branch name or commit SHA). Leave empty to use the default branch."
                required: false
                type: string
                default: ""
    push:
        tags:
            - "dev_tv_v*"
jobs:
    build-tv:
        runs-on: macos-latest
        permissions:
            contents: write
        env:
            # tag push 时 github.ref_name 是 tag 名；workflow_dispatch 时读 inputs.ref，为空则退回当前触发 ref
            CHECKOUT_REF: ${{ github.event.inputs.ref || github.ref_name }}
            # TV 签名 secret 映射——缺失时签名 step 跳过，Android 由 gradle 回退到 debug 签名
            TV_KEYSTORE_BASE64: ${{ secrets.TV_KEYSTORE_BASE64 }}
            TV_STORE_PASSWORD: ${{ secrets.TV_STORE_PASSWORD }}
            TV_KEY_PASSWORD: ${{ secrets.TV_KEY_PASSWORD }}
            TV_KEY_ALIAS: ${{ secrets.TV_KEY_ALIAS }}
        steps:
            # 签出代码至指定 ref
            - uses: actions/checkout@v4
              with:
                  ref: ${{ env.CHECKOUT_REF }}

            # APK 签名：TV_KEYSTORE_BASE64 secret 存在时才执行；缺失则跳过（产出 debug 签名的 APK）
            - name: Download Android keystore
              if: env.TV_KEYSTORE_BASE64 != ''
              id: android_tv_keystore
              uses: timheuer/base64-to-file@v1.2
              with:
                  fileName: keystore.jks
                  encodedString: ${{ secrets.TV_KEYSTORE_BASE64 }}
            - name: Create key.properties
              if: env.TV_KEYSTORE_BASE64 != ''
              run: |
                  echo "storeFile=${{ steps.android_tv_keystore.outputs.filePath }}" > simple_live_tv_app/android/key.properties
                  echo "storePassword=${{ secrets.TV_STORE_PASSWORD }}" >> simple_live_tv_app/android/key.properties
                  echo "keyPassword=${{ secrets.TV_KEY_PASSWORD }}" >> simple_live_tv_app/android/key.properties
                  echo "keyAlias=${{ secrets.TV_KEY_ALIAS }}" >> simple_live_tv_app/android/key.properties

            # 设置JAVA环境
            - uses: actions/setup-java@v4
              with:
                  distribution: "zulu"
                  java-version: "17"
                  cache: "gradle"

            #设置Flutter
            - name: Flutter action
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.38.x"
                  cache: true

            #更新Flutter的packages
            - name: Restore packages
              run: |
                  cd simple_live_tv_app
                  flutter pub get

            #打包APK
            - name: Build APK
              run: |
                  cd simple_live_tv_app
                  flutter build apk --release --split-per-abi

            #上传APK至Artifacts
            - name: Upload APK to Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: android_tv
                  path: |
                      simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
                      simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
                      simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            #完成
            - run: echo "🍏 This job's status is ${{ job.status }}."
